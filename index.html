<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:url("assets/login-bg.jpg") no-repeat center center/cover;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, Helvetica, sans-serif;
        }

        .overlay{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.6);
        }

        .container{
            position:relative;
            z-index:2;
            text-align:center;
            color:white;
        }

        .logo{
            width:220px;
            margin-bottom:30px;
        }

        h1{
            font-size:3rem;
            margin-bottom:15px;
        }

        p{
            font-size:1.2rem;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            background:#e50914;
            color:white;
            padding:15px 40px;
            text-decoration:none;
            border-radius:5px;
            font-size:18px;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            background:#b20710;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">

    <img src="assets/netflix-logo.png" class="logo" alt="Netflix Logo">

    <h1>Unlimited movies, TV shows and more</h1>

    <p>Watch anywhere. Cancel anytime.</p>

    <a href="login.html" class="btn">Get Started</a>

</div>

</body>
</html>
